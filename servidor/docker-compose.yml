# Financeiro Automatizado — Docker Compose
# Repositório: https://github.com/arturmrl26/financeiro-automatizado
#
# ATENÇÃO: Substitua as variáveis marcadas com <ALTERE> antes de usar
#
# Serviços:
#   - Evolution API v1.7.4 (porta 8080) — WhatsApp API
#   - n8n latest (porta 5678)           — Automação de fluxos

version: '3.8'

services:

  evolution-api:
    image: atendai/evolution-api:v1.7.4
    container_name: evolution
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=<ALTERE_SUA_CHAVE_AQUI>
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
    volumes:
      - evolution_data:/evolution/instances
    restart: always

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=<ALTERE_SUA_SENHA_AQUI>
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - N8N_SECURE_COOKIE=false
      - N8N_HOST=0.0.0.0
      - N8N_LISTEN_ADDRESS=0.0.0.0
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always

volumes:
  n8n_data:
  evolution_data:
